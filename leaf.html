<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script> //turf.js will use for lines
    <style>
        #map {position: absolute; top: 0; bottom: 0; left: 0; right:0;}
    </style>
</head>
<body>
    <div id = "map" ></div>

    <script>

        //setup for the map background
        var map = L.map('map').setView([46.0569, 14.5058], 9);
        var corner1 = [45.4, 13.3]
        var corner2 = [46.9, 16.6]   
        bounds = L.latLngBounds(corner1, corner2)
        map.setMaxBounds(bounds)
        map.setMinZoom(8);
        map.setMaxZoom(14);

        //tile layer, map background
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap & CARTO'
        }).addTo(map);

        //stations for the map
        const stations = [
            { name: "Ljubljana",              lat: 46.0569, lon: 14.5058 },
            { name: "Dobova",                 lat: 45.9019, lon: 15.6561 },
            { name: "Divača",                 lat: 45.6836, lon: 13.9664 },
            { name: "Koper Tovorna",          lat: 45.5542, lon: 13.7378 },
            { name: "Sežana",                 lat: 45.7039, lon: 13.8742 },
            { name: "Villa Opicina",          lat: 45.7150, lon: 13.8483 },
            { name: "Hodos",                  lat: 46.8197, lon: 16.3261 },
            { name: "Maribor Tezno",          lat: 46.5456, lon: 15.6811 },
            { name: "Pragersko",              lat: 46.3956, lon: 15.6644 },
            { name: "Celje",                  lat: 46.2308, lon: 15.2681 },
            { name: "Jesenice",               lat: 46.4339, lon: 14.0572 },
            { name: "Spielfeld (SLO border)", lat: 46.7167, lon: 15.6333 },
        ];

        stations.forEach(s => {
            L.marker([s.lat, s.lon]).addTo(map).bindPopup(s.name);
        });        

        let arrTime = 0;
        let depTime = 0;
        let travelTime = 0;
        const days = ['Su','Mo','Tu','We','Th','Fr','Sa'];       
        let trainMarkers = []; 
        
        //fill this with train lines, aquired using geojsonParser.py
        fetch('./ref10.json').then(res => res.json()).then(data => {L.geoJSON(data).addTo(map);});
        
        
        //updating positions
        fetch('./paps.json')
            .then(res => res.json())
            .then(data => {

            trainMarkers = data.paps.map((pap) => L.circleMarker([0, 0], {
                radius: 8,
                color: 'white',
                fillColor: pap.color ?? 'black', //if null use black
                fillOpacity: 0,
                opacity: 0,
                weight: 2
            })

            //${ss} insert variable here
            .bindPopup(`
                Unique id: ${pap.pap_id}
                Direction: ${pap.direction} 
                Origin: ${pap.origin}
                Destination: ${pap.destination}
            `)
            .addTo(map));

            //we update once to make the dots show
            updateTrains(data);
            //we update it every 5 seconds
            setInterval(() => updateTrains(data), 5000);
        });


        function updateTrains(data) {
            //write the update train function here
            }
            
    </script>
</body>
</html>
