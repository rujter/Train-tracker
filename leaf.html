        function haversine(lat1, lat2, long1, long2) { //finds the distance between two points using the haversine equasion
            const lat1Rad = lat1 * (Math.PI/180)
            const lat2Rad = lat2 * (Math.PI/180)
            const long1Rad = long1 * (Math.PI/180)
            const long2Rad = long2 * (Math.PI/180)
            const firstHalf = Math.sin((lat2Rad-lat1Rad)/2)*Math.sin((lat2Rad-lat1Rad)/2)
            const secondHalf = Math.sin((long2Rad-long1Rad)/2)*Math.sin((long2Rad-long1Rad)/2)*Math.cos(lat1Rad)*Math.cos(lat2Rad)
            const havFi = firstHalf + secondHalf
            const angle = 2 * Math.asin(Math.sqrt(havFi))
            const R = 6371
            const dist = R*angle
            return dist
        }
